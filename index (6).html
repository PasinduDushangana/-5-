<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bandaranayake College — Sports Meet 2025</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════
       ROOT & RESET
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-void:       #060b18;
      --bg-deep:       #0a1020;
      --bg-surface:    #0f1a30;
      --glass-bg:      rgba(255,255,255,0.035);
      --glass-border:  rgba(255,255,255,0.08);
      --glass-hover:   rgba(255,255,255,0.06);
      --text-primary:  #eef2ff;
      --text-secondary:#8898b8;
      --text-muted:    #4a5878;

      --gold:          #f5c518;
      --gold-glow:     rgba(245,197,24,0.35);
      --gold-dim:      rgba(245,197,24,0.12);
      --silver:        #b8c8e0;
      --silver-glow:   rgba(184,200,224,0.25);
      --bronze:        #cd8a4b;
      --bronze-glow:   rgba(205,138,75,0.25);
      --accent:        #00d4ff;
      --accent-glow:   rgba(0,212,255,0.2);

      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;

      --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-void);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ═══════════════════════════════════════════
       CANVAS STARFIELD BACKGROUND
    ═══════════════════════════════════════════ */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Radial ambient light */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,212,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,197,24,0.05) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(99,102,241,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════════════
       LAYOUT WRAPPER
    ═══════════════════════════════════════════ */
    .app-wrap {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    /* ═══════════════════════════════════════════
       HEADER / MASTHEAD
    ═══════════════════════════════════════════ */
    .masthead {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 48px 20px 32px;
      text-align: center;
    }

    .masthead-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      backdrop-filter: blur(12px);
    }

    .masthead-badge .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(0,212,255,0.6);
      animation: pulse-ring 1.8s ease-out infinite;
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(0,212,255,0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(0,212,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); }
    }

    .masthead-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #a8c4f0 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .masthead-sub {
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .masthead-meta {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .meta-chip svg { opacity: 0.6; flex-shrink: 0; }

    #last-updated-time { color: var(--text-secondary); }

    /* ═══════════════════════════════════════════
       SECTION HEADERS
    ═══════════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.15rem, 3vw, 1.45rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .section-pill {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.2);
      padding: 4px 12px;
      border-radius: 100px;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent);
    }

    /* ═══════════════════════════════════════════
       PODIUM SECTION
    ═══════════════════════════════════════════ */
    .podium-section { padding: 20px 0 40px; }

    .podium-stage {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      padding: 0 10px 0;
      perspective: 800px;
    }

    /* Podium slot */
    .podium-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      max-width: 300px;
      min-width: 0;
      animation: podiumRise 0.9s cubic-bezier(0.23,1,0.32,1) both;
    }

    .podium-slot:nth-child(1) { animation-delay: 0.15s; }
    .podium-slot:nth-child(2) { animation-delay: 0s; }
    .podium-slot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes podiumRise {
      from { opacity: 0; transform: translateY(40px) scale(0.92); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Avatar card above pillar */
    .podium-avatar-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px 18px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-bottom: none;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 100%;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }

    .podium-avatar-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--house-color, rgba(255,255,255,0.3));
      opacity: 0.8;
    }

    .podium-avatar-card:hover { background: var(--glass-hover); }

    /* Rank badge on avatar */
    .rank-crown {
      position: absolute;
      top: -2px; right: 10px;
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 8px var(--gold-glow));
    }

    .podium-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      background: rgba(255,255,255,0.06);
      border: 2px solid var(--house-color, rgba(255,255,255,0.2));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--house-color, white) 15%, transparent);
      position: relative;
    }

    /* Enlarged icon for 1st place */
    .podium-slot--first .podium-icon {
      width: 72px; height: 72px;
      font-size: 2rem;
    }

    .podium-house-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      color: var(--house-color, var(--text-primary));
      text-align: center;
    }

    .podium-points-val {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
    }

    .podium-points-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: -2px;
    }

    /* The physical podium pillar */
    .podium-pillar {
      width: 100%;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.07) 0%,
        rgba(255,255,255,0.03) 100%
      );
      border: 1px solid var(--glass-border);
      border-top: none;
      border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: height 0.8s cubic-bezier(0.23,1,0.32,1);
    }

    .podium-pillar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.04) 50%,
        transparent 100%
      );
    }

    .pillar-rank {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      color: rgba(255,255,255,0.06);
      user-select: none;
    }

    /* Pillar heights */
    .podium-slot--first  .podium-pillar { height: 120px; }
    .podium-slot--second .podium-pillar { height: 85px;  }
    .podium-slot--third  .podium-pillar { height: 60px;  }

    /* First-place special effects */
    .podium-slot--first .podium-avatar-card {
      box-shadow:
        0 0 40px var(--gold-glow),
        0 0 80px rgba(245,197,24,0.1),
        inset 0 1px 0 rgba(245,197,24,0.2);
    }

    .podium-slot--first .podium-avatar-card::before {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: goldShimmer 3s ease-in-out infinite;
    }

    @keyframes goldShimmer {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .podium-slot--first .podium-pillar {
      box-shadow:
        0 8px 40px var(--gold-glow),
        0 0 60px rgba(245,197,24,0.08);
    }

    /* Rank number inside pillar colored */
    .podium-slot--first  .pillar-rank { color: rgba(245,197,24,0.15); font-size: clamp(2.5rem,6vw,3.8rem); }
    .podium-slot--second .pillar-rank { color: rgba(184,200,224,0.12); }
    .podium-slot--third  .pillar-rank { color: rgba(205,138,75,0.12); }

    /* ═══════════════════════════════════════════
       LEADERBOARD SECTION
    ═══════════════════════════════════════════ */
    .leaderboard-section { padding: 8px 0 40px; }

    .lb-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .lb-row {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.5s cubic-bezier(0.23,1,0.32,1) both;
    }

    .lb-row:nth-child(1) { animation-delay: 0.05s; }
    .lb-row:nth-child(2) { animation-delay: 0.10s; }
    .lb-row:nth-child(3) { animation-delay: 0.15s; }
    .lb-row:nth-child(4) { animation-delay: 0.20s; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .lb-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--house-color, rgba(255,255,255,0.2));
      border-radius: 0 2px 2px 0;
    }

    .lb-row:hover {
      background: var(--glass-hover);
      transform: translateX(4px);
      border-color: rgba(255,255,255,0.12);
    }

    .lb-row--first {
      border-color: rgba(245,197,24,0.2);
      box-shadow: 0 0 20px rgba(245,197,24,0.08);
    }

    .lb-rank {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text-muted);
      text-align: center;
    }

    .lb-row--first .lb-rank { color: var(--gold); }

    .lb-info { min-width: 0; }

    .lb-house {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .lb-house-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--house-color, #fff);
      box-shadow: 0 0 8px var(--house-color, transparent);
    }

    .lb-house-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-progress-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      overflow: hidden;
    }

    .lb-progress-bar {
      height: 100%;
      border-radius: 100px;
      background: var(--house-color, #fff);
      transition: width 1.2s cubic-bezier(0.23,1,0.32,1);
      position: relative;
      width: 0%;
    }

    .lb-progress-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.5) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      from { background-position: -200% 0; }
      to   { background-position: 200% 0; }
    }

    .lb-points {
      text-align: right;
      flex-shrink: 0;
    }

    .lb-points-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
      display: block;
      line-height: 1;
    }

    .lb-points-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════════════════
       EVENTS SECTION
    ═══════════════════════════════════════════ */
    .events-section { padding: 8px 0 40px; }

    .events-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: var(--transition);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: rgba(0,212,255,0.12);
      border-color: rgba(0,212,255,0.3);
      color: var(--accent);
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .event-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow: hidden;
      transition: var(--transition);
      animation: cardAppear 0.5s cubic-bezier(0.23,1,0.32,1) both;
    }

    .event-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .event-card-head {
      padding: 16px 18px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--glass-border);
    }

    .event-sport-name {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .event-category-tag {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(0,212,255,0.1);
      border: 1px solid rgba(0,212,255,0.18);
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .event-winners { padding: 8px 8px 10px; }

    .winner-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
    }

    .winner-row:hover { background: rgba(255,255,255,0.03); }

    .winner-medal {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    .medal-1 {
      background: radial-gradient(circle at 35% 35%, #ffe680, var(--gold));
      color: #5a3d00;
      box-shadow: 0 2px 8px var(--gold-glow);
    }

    .medal-2 {
      background: radial-gradient(circle at 35% 35%, #e8eef8, #9fb0c8);
      color: #2a3a52;
      box-shadow: 0 2px 8px var(--silver-glow);
    }

    .medal-3 {
      background: radial-gradient(circle at 35% 35%, #e8b888, var(--bronze));
      color: #3a1a00;
      box-shadow: 0 2px 8px var(--bronze-glow);
    }

    .winner-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .winner-house-tag {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 100px;
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ═══════════════════════════════════════════
       LIVE TICKER FOOTER
    ═══════════════════════════════════════════ */
    .ticker-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      height: 40px;
      background: rgba(6,11,24,0.9);
      border-top: 1px solid rgba(0,212,255,0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .ticker-label {
      flex-shrink: 0;
      padding: 0 16px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--bg-void);
      background: var(--accent);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .ticker-track {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .ticker-inner {
      display: flex;
      gap: 60px;
      animation: ticker 35s linear infinite;
      white-space: nowrap;
    }

    .ticker-inner:hover { animation-play-state: paused; }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item {
      font-size: 0.78rem;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .ticker-item strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .ticker-sep {
      color: var(--text-muted);
      margin: 0 12px;
    }

    /* ═══════════════════════════════════════════
       UPDATE TOAST
    ═══════════════════════════════════════════ */
    .update-toast {
      position: fixed;
      top: 20px; right: 20px;
      z-index: 200;
      padding: 12px 20px;
      background: rgba(0,212,255,0.12);
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: var(--radius-md);
      backdrop-filter: blur(20px);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
      pointer-events: none;
    }

    .update-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══════════════════════════════════════════
       SKELETON / LOADING
    ═══════════════════════════════════════════ */
    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.04) 75%
      );
      background-size: 200% 100%;
      animation: skeletonPulse 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes skeletonPulse {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 0;
    }

    .skeleton-row { height: 72px; border-radius: var(--radius-md); }
    .skeleton-card { height: 160px; border-radius: var(--radius-lg); }

    /* ═══════════════════════════════════════════
       ERROR STATE
    ═══════════════════════════════════════════ */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .error-state .error-icon { font-size: 3rem; margin-bottom: 16px; }
    .error-state h3 { font-family: 'Syne', sans-serif; font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 8px; }
    .error-state p { font-size: 0.85rem; }

    /* ═══════════════════════════════════════════
       STATS STRIP
    ═══════════════════════════════════════════ */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin: 0 0 40px;
    }

    .stat-tile {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      backdrop-filter: blur(12px);
      transition: var(--transition);
    }

    .stat-tile:hover { background: var(--glass-hover); }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════════════════
       REFRESH COUNTDOWN PILL
    ═══════════════════════════════════════════ */
    .refresh-pill {
      position: fixed;
      bottom: 52px;
      right: 16px;
      z-index: 99;
      background: rgba(6,11,24,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 0.7rem;
      color: var(--text-muted);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .refresh-ring {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      animation: spin 2s linear infinite;
      display: none;
    }

    .refresh-ring.spinning { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ═══════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 100px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    /* ═══════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      .podium-stage { gap: 8px; }
      .podium-avatar-card { padding: 12px 8px 14px; }
      .podium-slot--first .podium-icon { width: 56px; height: 56px; font-size: 1.7rem; }
      .podium-icon { width: 44px; height: 44px; font-size: 1.3rem; }
      .podium-slot--first  .podium-pillar { height: 90px; }
      .podium-slot--second .podium-pillar { height: 65px; }
      .podium-slot--third  .podium-pillar { height: 46px; }
      .lb-row { grid-template-columns: 36px 1fr auto; padding: 13px 14px; gap: 10px; }
      .events-grid { grid-template-columns: 1fr; }
      .stats-strip { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 900px) {
      .podium-stage { gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- Particle Canvas -->
  <canvas id="bg-canvas"></canvas>

  <!-- Update Toast -->
  <div class="update-toast" id="update-toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.18-6.54"/></svg>
    Scoreboard refreshed
  </div>

  <!-- Refresh Pill -->
  <div class="refresh-pill" id="refresh-pill">
    <div class="refresh-ring" id="refresh-ring"></div>
    <span id="countdown-text">Next refresh in <strong id="countdown">30</strong>s</span>
  </div>

  <!-- Main App -->
  <div class="app-wrap">

    <!-- Masthead -->
    <header class="masthead">
      <div class="masthead-badge">
        <span class="pulse-dot"></span>
        Live Scoreboard
      </div>
      <h1 class="masthead-title">Bandaranayake College<br/>Sports Meet 2025</h1>
      <p class="masthead-sub">Annual Inter-House Athletics Championship</p>
      <div class="masthead-meta">
        <span class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Last updated: <span id="last-updated-time">—</span>
        </span>
        <span class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
          <span id="total-events-meta">—</span> Events
        </span>
        <span class="meta-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          4 Houses Competing
        </span>
      </div>
    </header>

    <!-- Stats Strip -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-tile skeleton" style="height:78px;"></div>
      <div class="stat-tile skeleton" style="height:78px;"></div>
      <div class="stat-tile skeleton" style="height:78px;"></div>
      <div class="stat-tile skeleton" style="height:78px;"></div>
    </div>

    <!-- Podium -->
    <section class="podium-section">
      <div class="section-header">
        <span class="section-label">Champions Podium</span>
        <span class="section-pill">Top 3</span>
        <div class="section-line"></div>
      </div>
      <div class="podium-stage" id="podium-stage">
        <div class="loading-state" style="width:100%;">
          <div class="skeleton skeleton-row"></div>
        </div>
      </div>
    </section>

    <!-- Leaderboard -->
    <section class="leaderboard-section">
      <div class="section-header">
        <span class="section-label">House Standings</span>
        <span class="section-pill">All Houses</span>
        <div class="section-line"></div>
      </div>
      <div class="lb-list" id="lb-list">
        <div class="loading-state">
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
          <div class="skeleton skeleton-row"></div>
        </div>
      </div>
    </section>

    <!-- Events -->
    <section class="events-section">
      <div class="section-header">
        <span class="section-label">Event Results</span>
        <span class="section-pill" id="events-count-pill">—</span>
        <div class="section-line"></div>
      </div>
      <div class="events-filter" id="events-filter"></div>
      <div class="events-grid" id="events-grid">
        <div class="loading-state" style="grid-column:1/-1;">
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
      </div>
    </section>

  </div>

  <!-- Ticker Bar -->
  <div class="ticker-bar">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="ticker-inner">
        <span class="ticker-item">Loading live feed…</span>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       JAVASCRIPT
  ═══════════════════════════════════════════ -->
  <script>
  (() => {
    'use strict';

    /* ── Canvas Particles ─────────────────────── */
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, particles = [];

    function initCanvas() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = Array.from({ length: 80 }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.2 + 0.3,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        o:  Math.random() * 0.5 + 0.1,
      }));
    }

    function animateParticles() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(180,210,255,${p.o})`;
        ctx.fill();
      });
      requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => { initCanvas(); createParticles(); });
    initCanvas(); createParticles(); animateParticles();

    /* ── State ───────────────────────────────── */
    let currentFilter = 'All';
    let lastData = null;
    let countdown = 30;
    let countdownTimer;

    /* ── Fetch Data ──────────────────────────── */
    async function fetchData() {
      const ring = document.getElementById('refresh-ring');
      ring.classList.add('spinning');
      try {
        const res  = await fetch(`data.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Sort highest → lowest
        data.overall_scores.sort((a, b) => b.points - a.points);

        const isUpdate = lastData && JSON.stringify(lastData) !== JSON.stringify(data);
        lastData = data;

        renderAll(data);
        if (isUpdate) showToast();

      } catch (err) {
        console.error('Fetch error:', err);
        renderError();
      } finally {
        ring.classList.remove('spinning');
      }
    }

    /* ── Countdown Timer ─────────────────────── */
    function startCountdown() {
      clearInterval(countdownTimer);
      countdown = 30;
      updateCountdownDisplay();
      countdownTimer = setInterval(() => {
        countdown--;
        updateCountdownDisplay();
        if (countdown <= 0) {
          countdown = 30;
          fetchData();
        }
      }, 1000);
    }

    function updateCountdownDisplay() {
      const el = document.getElementById('countdown');
      if (el) el.textContent = countdown;
    }

    /* ── Toast ───────────────────────────────── */
    function showToast() {
      const toast = document.getElementById('update-toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    /* ── Color helpers ───────────────────────── */
    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function getHouseColor(house, scores) {
      const match = scores.find(s => s.house === house);
      return match ? match.color_hex : '#888';
    }

    /* ── Format Date ─────────────────────────── */
    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('en-GB', {
          day:'2-digit', month:'short', year:'numeric',
          hour:'2-digit', minute:'2-digit'
        });
      } catch { return iso; }
    }

    /* ── Render All ──────────────────────────── */
    function renderAll(data) {
      const scores = data.overall_scores;
      const events = data.events;
      const maxPts = scores[0].points;

      // Meta
      document.getElementById('last-updated-time').textContent = formatDate(data.last_updated);
      document.getElementById('total-events-meta').textContent = events.length;
      document.getElementById('events-count-pill').textContent = `${events.length} Events`;

      renderStats(scores, events);
      renderPodium(scores);
      renderLeaderboard(scores, maxPts);
      renderEventFilters(events);
      renderEvents(events, scores);
      renderTicker(scores, events);
    }

    /* ── Stats Strip ─────────────────────────── */
    function renderStats(scores, events) {
      const totalPoints = scores.reduce((a,s) => a + s.points, 0);
      const leader = scores[0];
      const tiles = [
        { value: leader.house,       label: 'Current Leader', color: leader.color_hex },
        { value: leader.points,      label: 'Leading Points', color: leader.color_hex },
        { value: events.length,      label: 'Total Events',   color: '#00d4ff' },
        { value: totalPoints,        label: 'Points Awarded', color: '#a78bfa' },
      ];
      const strip = document.getElementById('stats-strip');
      strip.innerHTML = tiles.map(t => `
        <div class="stat-tile">
          <div class="stat-value" style="color:${t.color}">${t.value}</div>
          <div class="stat-label">${t.label}</div>
        </div>
      `).join('');
    }

    /* ── Podium ──────────────────────────────── */
    function renderPodium(scores) {
      const top3   = scores.slice(0, 3);
      // Order: 2nd | 1st | 3rd (classic podium layout)
      const order  = [top3[1], top3[0], top3[2]].filter(Boolean);
      const clsMap = ['second','first','third'];
      const rankMap= ['2nd','1st','3rd'];
      const crownMap = ['🥈','👑','🥉'];
      const pillarH = [85, 120, 60];

      const stage = document.getElementById('podium-stage');
      stage.innerHTML = order.map((h, i) => {
        const realRank = i === 1 ? 1 : i === 0 ? 2 : 3;
        return `
        <div class="podium-slot podium-slot--${clsMap[i]}"
             style="--house-color:${h.color_hex}">
          <div class="podium-avatar-card">
            <span class="rank-crown">${crownMap[i]}</span>
            <div class="podium-icon">${h.icon || '🏆'}</div>
            <div class="podium-house-name">${h.house}</div>
            <div class="podium-points-val" data-target="${h.points}">0</div>
            <div class="podium-points-label">Points</div>
          </div>
          <div class="podium-pillar" style="height:${pillarH[i]}px">
            <span class="pillar-rank">${rankMap[i]}</span>
          </div>
        </div>`;
      }).join('');

      // Animate counter
      document.querySelectorAll('.podium-points-val[data-target]').forEach(el => {
        animateCount(el, 0, parseInt(el.dataset.target), 1200);
      });
    }

    /* ── Animated Counter ────────────────────── */
    function animateCount(el, from, to, duration) {
      const start = performance.now();
      function update(ts) {
        const progress = Math.min((ts - start) / duration, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(from + (to - from) * ease);
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    /* ── Leaderboard ─────────────────────────── */
    function renderLeaderboard(scores, maxPts) {
      const list = document.getElementById('lb-list');
      list.innerHTML = scores.map((h, i) => {
        const pct = (h.points / maxPts * 100).toFixed(1);
        const isFirst = i === 0;
        return `
        <div class="lb-row ${isFirst ? 'lb-row--first' : ''}"
             style="--house-color:${h.color_hex}">
          <div class="lb-rank">${i + 1}</div>
          <div class="lb-info">
            <div class="lb-house">
              <div class="lb-house-dot"></div>
              <div class="lb-house-name">${h.icon || ''} ${h.house}</div>
            </div>
            <div class="lb-progress-track">
              <div class="lb-progress-bar" data-width="${pct}" style="background:${h.color_hex};width:0%"></div>
            </div>
          </div>
          <div class="lb-points">
            <span class="lb-points-val">${h.points}</span>
            <span class="lb-points-label">pts</span>
          </div>
        </div>`;
      }).join('');

      // Animate progress bars
      requestAnimationFrame(() => {
        document.querySelectorAll('.lb-progress-bar[data-width]').forEach(bar => {
          const w = bar.dataset.width;
          setTimeout(() => { bar.style.width = w + '%'; }, 200);
        });
      });
    }

    /* ── Event Filters ───────────────────────── */
    function renderEventFilters(events) {
      const cats = ['All', ...new Set(events.map(e => e.category || 'Other'))];
      const filterEl = document.getElementById('events-filter');
      filterEl.innerHTML = cats.map(c => `
        <button class="filter-btn ${c === currentFilter ? 'active' : ''}"
                onclick="window.__setFilter('${c}')">${c}</button>
      `).join('');
    }

    window.__setFilter = function(cat) {
      currentFilter = cat;
      if (!lastData) return;
      renderEventFilters(lastData.events);
      renderEvents(lastData.events, lastData.overall_scores);
    };

    /* ── Events Grid ─────────────────────────── */
    function renderEvents(events, scores) {
      const filtered = currentFilter === 'All'
        ? events
        : events.filter(e => (e.category || 'Other') === currentFilter);

      const grid = document.getElementById('events-grid');

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="error-state" style="grid-column:1/-1;">
          <div class="error-icon">🏁</div>
          <h3>No events found</h3>
          <p>No events in this category yet.</p>
        </div>`;
        return;
      }

      const medalLabels = ['1st','2nd','3rd'];
      grid.innerHTML = filtered.map((ev, cardIdx) => {
        const rows = ev.winners.map((w, wi) => {
          const hColor = getHouseColor(w.house, scores);
          return `
          <div class="winner-row">
            <div class="winner-medal medal-${w.rank}">${medalLabels[wi]}</div>
            <div class="winner-name">${w.student}</div>
            <div class="winner-house-tag" style="color:${hColor};border-color:${hexToRgba(hColor,0.25)};background:${hexToRgba(hColor,0.1)}">${w.house}</div>
          </div>`;
        }).join('');

        return `
        <div class="event-card" style="animation-delay:${cardIdx * 0.04}s">
          <div class="event-card-head">
            <div class="event-sport-name">${ev.sport_name}</div>
            <div class="event-category-tag">${ev.category || 'Event'}</div>
          </div>
          <div class="event-winners">${rows}</div>
        </div>`;
      }).join('');
    }

    /* ── Ticker ──────────────────────────────── */
    function renderTicker(scores, events) {
      const items = [
        `🏆 <strong>${scores[0].house}</strong> leads with <strong>${scores[0].points} pts</strong>`,
        ...scores.map(s => `${s.icon || ''} ${s.house}: <strong>${s.points} pts</strong>`),
        ...events.flatMap(ev =>
          ev.winners.slice(0,1).map(w =>
            `🥇 ${ev.sport_name} — <strong>${w.student}</strong> (${w.house})`
          )
        ),
      ];

      // Duplicate for seamless loop
      const both = [...items, ...items];
      const ticker = document.getElementById('ticker-inner');
      ticker.innerHTML = both.map(item =>
        `<span class="ticker-item">${item}</span><span class="ticker-sep">•</span>`
      ).join('');
    }

    /* ── Error State ─────────────────────────── */
    function renderError() {
      if (lastData) return; // Don't overwrite good data
      ['podium-stage','lb-list','events-grid'].forEach(id => {
        document.getElementById(id).innerHTML = `
          <div class="error-state" style="grid-column:1/-1;width:100%">
            <div class="error-icon">⚠️</div>
            <h3>Unable to load scores</h3>
            <p>Make sure <code>data.json</code> is in the same directory.</p>
          </div>`;
      });
    }

    /* ── Init ────────────────────────────────── */
    fetchData();
    startCountdown();

    // Also refetch every 30s via interval (belt and suspenders)
    setInterval(fetchData, 30000);

  })();
  </script>
